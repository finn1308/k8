<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Xuân Của Chúng Ta - A4K41</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel để chạy JSX trên trình duyệt -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Quicksand', sans-serif; background-color: #fdfbf7; color: #1e293b; }
        .font-caveat { font-family: 'Caveat', cursive; }
        .glass-nav { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .masonry-grid { column-count: 2; column-gap: 1rem; }
        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }
        .masonry-item { break-inside: avoid; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Lucide icon helper for React
        const Icon = ({ name, ...props }) => {
            const LucideIcon = lucide.icons[name];
            return LucideIcon ? <LucideIcon {...props} /> : null;
        };

        // --- MOCK DATA ---
        const CLASS_MEMBERS = [
            { id: 1, name: 'Nguyễn Văn A', nickname: 'A "Cú Cáo"', quote: '"Thanh xuân như một tách trà, ăn xong miếng bánh hết bà thanh xuân."', img: 'https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&q=80&w=400&h=400' },
            { id: 2, name: 'Trần Thị B', nickname: 'B "Điệu đà"', quote: '"Hứa với nhau là sẽ không quên nhé!"', img: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?auto=format&fit=crop&q=80&w=400&h=400' },
            { id: 3, name: 'Lê Hoàng C', nickname: 'C "Học bá"', quote: '"Cảm ơn vì đã là một phần tuổi trẻ của tôi."', img: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&q=80&w=400&h=400' },
            { id: 4, name: 'Phạm D', nickname: 'D "Tổ trưởng"', quote: '"Nhớ mãi những buổi chiều trốn trực nhật cùng nhau."', img: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=400&h=400' },
            { id: 5, name: 'Hoàng Thị E', nickname: 'E "Bà La Sát"', quote: '"Đi đâu cũng được, miễn là đi cùng nhau."', img: 'https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&q=80&w=400&h=400' },
            { id: 6, name: 'Vũ Văn F', nickname: 'F "Chúa hề"', quote: '"Cười lên đi, khóc làm gì cho nhòe mascara."', img: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=400&h=400' },
            { id: 7, name: 'Đặng G', nickname: 'G "Mọt sách"', quote: '"Sau này hãy gặp lại nhau ở phiên bản tốt nhất nhé."', img: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=400&h=400' },
            { id: 8, name: 'Bùi H', nickname: 'H "Ngủ nướng"', quote: '"Mai sau có ra sao, cũng đừng quên năm tháng này."', img: 'https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&q=80&w=400&h=400' },
        ];

        const GALLERY_IMAGES = [
            { id: 1, url: 'https://images.unsplash.com/photo-1523580494863-6f3031224c94?auto=format&fit=crop&q=80&w=800', caption: 'Lễ khai giảng năm ấy...' },
            { id: 2, url: 'https://images.unsplash.com/photo-1511632765486-a01980e01a18?auto=format&fit=crop&q=80&w=800', caption: 'Chuyến dã ngoại mùa thu' },
            { id: 3, url: 'https://images.unsplash.com/photo-1529390079861-591de354faf5?auto=format&fit=crop&q=80&w=800', caption: 'Những giờ học căng thẳng' },
            { id: 4, url: 'https://images.unsplash.com/photo-1606761568499-6d2451b08c66?auto=format&fit=crop&q=80&w=800', caption: 'Lễ tri ân - Khóc hết nước mắt' },
            { id: 5, url: 'https://images.unsplash.com/photo-1540317580384-e5d43867caa6?auto=format&fit=crop&q=80&w=800', caption: 'Vô địch kéo co toàn trường' },
            { id: 6, url: 'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?auto=format&fit=crop&q=80&w=800', caption: 'Thanh xuân rực rỡ' },
        ];

        const TIMELINE_EVENTS = [
            { id: 1, date: 'Tháng 9, 2022', title: 'Ngày Đầu Tiên', desc: 'Bỡ ngỡ bước vào lớp, những ánh mắt nhìn nhau còn ngại ngùng.' },
            { id: 2, date: 'Tháng 5, 2023', title: 'Kết Thúc Năm Nhất', desc: 'Bắt đầu hiểu tính nhau hơn qua những giờ chơi.' },
            { id: 3, date: 'Tháng 3, 2024', title: 'Hội Trại 26/3', desc: 'Đêm đốt lửa trại đáng nhớ cùng nhau hát hò.' },
            { id: 4, date: 'Tháng 9, 2024', title: 'Năm Cuối Cấp', desc: 'Áp lực thi cử nhưng tình bạn càng bền chặt.' },
            { id: 5, date: 'Tháng 5, 2025', title: 'Lễ Trưởng Thành', desc: 'Tạm biệt mái trường, tạm biệt thanh xuân.' },
        ];

        const GUESTBOOK_NOTES = [
            { id: 1, text: 'Chúc A4 luôn thành công nhé! Nhớ mọi người.', color: 'bg-blue-100', rotate: '-rotate-2' },
            { id: 2, text: 'Thi đại học đỗ hết nha mấy đứa!', color: 'bg-pink-100', rotate: 'rotate-3' },
            { id: 3, text: 'Cảm ơn vì đã là một phần tuổi trẻ của tôi.', color: 'bg-yellow-100', rotate: '-rotate-1' },
            { id: 4, text: 'Thanh xuân có các cậu là điều tuyệt vời nhất!', color: 'bg-purple-100', rotate: 'rotate-2' },
        ];

        // --- COMPONENTS ---

        function Navbar({ toggleAudio, isPlaying }) {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <header className={`fixed top-0 w-full z-50 transition-all duration-300 ${scrolled ? 'glass-nav py-3 shadow-sm' : 'bg-transparent py-5'}`}>
                    <div className="container mx-auto px-4 md:px-6 flex justify-between items-center">
                        <a href="#home" className="font-caveat text-3xl font-bold text-slate-800">A4K41</a>
                        <nav className="hidden lg:flex items-center space-x-8">
                            {['Trang chủ', 'Thành viên', 'Khoảnh khắc', 'Dòng thời gian', 'Lưu bút'].map((name, i) => (
                                <a key={i} href={`#${['home', 'members', 'gallery', 'timeline', 'guestbook'][i]}`} className="text-sm font-medium hover:text-blue-500 transition-colors">
                                    {name}
                                </a>
                            ))}
                        </nav>
                        <button onClick={toggleAudio} className="w-10 h-10 rounded-full bg-white/50 flex items-center justify-center shadow-sm border border-slate-100">
                            <Icon name={isPlaying ? "Pause" : "Play"} size={18} />
                        </button>
                    </div>
                </header>
            );
        }

        function Hero() {
            return (
                <section id="home" className="relative h-screen flex items-center justify-center overflow-hidden">
                    <div className="absolute inset-0 bg-cover bg-center z-0 scale-105" style={{ backgroundImage: "url('https://images.unsplash.com/photo-1529390079861-591de354faf5?auto=format&fit=crop&q=80&w=1920')" }} />
                    <div className="absolute inset-0 bg-gradient-to-b from-white/40 via-white/20 to-[#fdfbf7] backdrop-blur-[2px] z-10" />
                    <div className="relative z-20 text-center px-4 flex flex-col items-center">
                        <h1 className="font-caveat text-7xl md:text-9xl text-slate-800 mb-4">Thanh Xuân</h1>
                        <p className="text-lg md:text-2xl text-slate-700 font-medium">Những năm tháng rực rỡ dưới mái trường thân yêu - A4K41</p>
                        <a href="#members" className="mt-10 px-8 py-3 bg-white/80 hover:bg-white text-slate-800 font-semibold rounded-full shadow-md transition-all">Khám phá kỷ niệm</a>
                    </div>
                </section>
            );
        }

        function Members() {
            const [selected, setSelected] = useState(null);
            return (
                <section id="members" className="py-24 px-4 max-w-7xl mx-auto">
                    <div className="text-center mb-16">
                        <h2 className="font-caveat text-6xl text-slate-800 mb-2">Mảnh Ghép A4</h2>
                        <div className="w-16 h-1 bg-blue-200 mx-auto rounded-full"></div>
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
                        {CLASS_MEMBERS.map(m => (
                            <div key={m.id} className="group cursor-pointer text-center" onClick={() => setSelected(m)}>
                                <div className="rounded-[20px] overflow-hidden aspect-square mb-4 shadow-sm group-hover:shadow-xl transition-all">
                                    <img src={m.img} className="w-full h-full object-cover group-hover:scale-110 transition-duration-500" />
                                </div>
                                <h3 className="font-bold text-lg">{m.name}</h3>
                                <p className="font-caveat text-xl text-slate-500">{m.nickname}</p>
                            </div>
                        ))}
                    </div>
                    {selected && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm" onClick={() => setSelected(null)}>
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full relative" onClick={e => e.stopPropagation()}>
                                <button className="absolute top-4 right-4" onClick={() => setSelected(null)}><Icon name="X" /></button>
                                <div className="text-center">
                                    <img src={selected.img} className="w-32 h-32 rounded-full mx-auto object-cover mb-4 border-4 border-white shadow-md" />
                                    <h2 className="text-2xl font-bold">{selected.name}</h2>
                                    <p className="font-caveat text-2xl text-slate-600 mt-4 bg-pink-50 p-6 rounded-2xl italic">"{selected.quote}"</p>
                                </div>
                            </div>
                        </div>
                    )}
                </section>
            );
        }

        function App() {
            const [isPlaying, setIsPlaying] = useState(false);
            const audioRef = useRef(null);

            const toggleAudio = () => {
                if (isPlaying) audioRef.current.pause();
                else audioRef.current.play();
                setIsPlaying(!isPlaying);
            };

            return (
                <div>
                    <audio ref={audioRef} loop src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=lofi-study-112191.mp3"></audio>
                    <Navbar toggleAudio={toggleAudio} isPlaying={isPlaying} />
                    <Hero />
                    <Members />
                    
                    <section id="gallery" className="py-24 bg-white/50 px-4">
                        <div className="max-w-7xl mx-auto">
                            <h2 className="font-caveat text-6xl text-center text-slate-800 mb-12">Ngưng Đọng Thời Gian</h2>
                            <div className="masonry-grid">
                                {GALLERY_IMAGES.map(img => (
                                    <div key={img.id} className="masonry-item rounded-[20px] overflow-hidden shadow-sm hover:shadow-lg transition-all relative group">
                                        <img src={img.url} className="w-full h-auto" />
                                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-all flex items-end p-4">
                                            <p className="text-white font-medium">{img.caption}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section id="timeline" className="py-24 px-4 max-w-4xl mx-auto">
                        <h2 className="font-caveat text-6xl text-center mb-16">Chuyến Tàu Thanh Xuân</h2>
                        <div className="space-y-12">
                            {TIMELINE_EVENTS.map((ev, i) => (
                                <div key={i} className="flex gap-6">
                                    <div className="flex flex-col items-center">
                                        <div className="w-4 h-4 rounded-full bg-blue-300"></div>
                                        <div className="w-0.5 h-full bg-blue-100"></div>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl shadow-sm flex-1">
                                        <span className="text-blue-500 font-bold text-sm">{ev.date}</span>
                                        <h3 className="font-bold text-xl">{ev.title}</h3>
                                        <p className="text-slate-600 mt-2">{ev.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    <section id="guestbook" className="py-24 px-4 max-w-7xl mx-auto">
                        <h2 className="font-caveat text-6xl text-center mb-12">Góc Lưu Bút</h2>
                        <div className="flex flex-wrap justify-center gap-6">
                            {GUESTBOOK_NOTES.map(n => (
                                <div key={n.id} className={`${n.color} ${n.rotate} p-6 w-64 h-64 shadow-md flex flex-col justify-between`}>
                                    <p className="font-caveat text-2xl leading-relaxed">{n.text}</p>
                                    <p className="text-right text-slate-500 text-sm italic">~ A4K41 Member</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    <footer className="py-12 bg-white border-t text-center">
                        <h2 className="font-caveat text-4xl mb-4">A4K41</h2>
                        <p className="text-slate-500 text-sm">© 2025 Lớp A4K41 - Thanh Xuân của chúng ta mãi mãi ở đây.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
